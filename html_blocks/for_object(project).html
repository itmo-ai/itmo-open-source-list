<style>
/* текущий код отвечает за плавность и скролл плашки "проекты"  */
@media screen and (min-width: 960px) {
  .projects-sticky-label {
    position: fixed !important;
    z-index: 20 !important;
    transition: none !important;
    will-change: top;
  }
}
</style>

<script>
window.addEventListener('load', function () {
  if (window.innerWidth < 960) return;

  var isInitialized = false;

  function initProjectsLabel() {
    if (isInitialized) return;

    var groups = Array.from(
      document.querySelectorAll('.t396__group[data-group-id="1765376188092000002"]')
    );

    var projectsGroup = groups.find(function (group) {
      return group.innerText.trim() === 'Проекты';
    });

    /*
      Класс должен быть навешен на обе кнопки:
      "Пишите" и "Репозиторий".
    */
    var stopButtons = Array.from(
      document.querySelectorAll('.projects-stop-btn')
    );

    if (!projectsGroup || !stopButtons.length) return;

    isInitialized = true;

    var initialTop = null;
    var initialLeft = null;
    var initialWidth = null;
    var stickyTop = 16;

    function clearFixed() {
      projectsGroup.classList.remove('projects-sticky-label');
      projectsGroup.style.position = '';
      projectsGroup.style.top = '';
      projectsGroup.style.left = '';
      projectsGroup.style.width = '';
      projectsGroup.style.zIndex = '';
    }

    function lockFixed(topValue) {
      projectsGroup.classList.add('projects-sticky-label');
      projectsGroup.style.top = topValue + 'px';
      projectsGroup.style.left = initialLeft + 'px';
      projectsGroup.style.width = initialWidth + 'px';
      projectsGroup.style.zIndex = '20';
    }

    function recalcInitialPosition() {
      clearFixed();

      var rect = projectsGroup.getBoundingClientRect();

      initialTop = rect.top + window.scrollY;
      initialLeft = rect.left;
      initialWidth = rect.width;
    }

    function getStopButtonsBottom() {
      return Math.max.apply(null, stopButtons.map(function (button) {
        return button.getBoundingClientRect().bottom + window.scrollY;
      }));
    }

    function update() {
      if (window.innerWidth < 960) {
        clearFixed();
        return;
      }

      if (initialTop === null) {
        recalcInitialPosition();
      }

      var currentScroll = window.scrollY;
      var groupHeight = projectsGroup.getBoundingClientRect().height;

      var startStick = initialTop - stickyTop;

      /*
        Плашка останавливается так, чтобы её нижний край
        совпал с нижним краем самой нижней кнопки.
      */
      var stopButtonsBottom = getStopButtonsBottom();
      var stopTopAbsolute = stopButtonsBottom - groupHeight;
      var stopStick = stopTopAbsolute - stickyTop;

      if (currentScroll < startStick) {
        clearFixed();
        return;
      }

      if (currentScroll >= startStick && currentScroll < stopStick) {
        lockFixed(stickyTop);
        return;
      }

      lockFixed(stopTopAbsolute - currentScroll);
    }

    window.addEventListener('scroll', update, { passive: true });

    window.addEventListener('resize', function () {
      initialTop = null;
      initialLeft = null;
      initialWidth = null;

      clearFixed();

      setTimeout(function () {
        recalcInitialPosition();
        update();
      }, 100);
    });

    setTimeout(update, 100);
    setTimeout(update, 500);
    setTimeout(update, 1500);

    update();
  }

  setTimeout(initProjectsLabel, 500);
  setTimeout(initProjectsLabel, 1500);
});
</script>
