<script>
const logoCache = {};
let laboratories = [];
let projects = [];
let scrollPosition = 0;

function fixContainerHeight() {
  var elemId = '1771012805609';
  var recId = '1945326471';

  var elem = document.querySelector(
    '#rec' + recId + ' .tn-elem[data-elem-id="' + elemId + '"]'
  );
  if (elem) {
    elem.style.setProperty('height', 'auto', 'important');
  }

  var artboard = document.querySelector(
    '.t396__artboard[data-artboard-recid="' + recId + '"]'
  );
  var carrier = document.querySelector(
    '.t396__carrier[data-artboard-recid="' + recId + '"]'
  );
  var filter = document.querySelector(
    '.t396__filter[data-artboard-recid="' + recId + '"]'
  );

  [artboard, carrier, filter].forEach(function(el) {
    if (el) {
      el.style.setProperty('height', 'auto', 'important');
    }
  });
}

const ICONS = {
  TELEGRAM_WHITE: 'https://static.tildacdn.com/tild3438-3863-4434-b939-336335663536/telegram_black.svg',
  TELEGRAM_BLACK: 'https://static.tildacdn.com/tild3537-6164-4531-a239-333933343333/telegram_white.svg',
  VK_WHITE: 'https://static.tildacdn.com/tild3139-6137-4066-b834-313163343532/vk_black.svg',
  VK_BLACK: 'https://static.tildacdn.com/tild3264-6663-4534-b034-383034323861/vk_white.svg',
  WEBSITE_WHITE: 'https://static.tildacdn.com/tild6435-6262-4839-b034-613566333736/browser_black.svg',
  WEBSITE_BLACK: 'https://static.tildacdn.com/tild3663-6163-4863-b838-346464633635/browser_white.svg',
  DOCS_WHITE: 'https://static.tildacdn.com/tild3332-3831-4539-a361-653239346535/docs_black.svg',
  DOCS_BLACK: 'https://static.tildacdn.com/tild3338-6638-4536-b765-393332363633/docs_white.svg',
  GITHUB_WHITE: 'https://static.tildacdn.com/tild6435-3538-4938-a464-663361343436/mdi--github.svg',
  GITHUB_BLACK: 'https://static.tildacdn.com/tild6436-6263-4865-b263-303266623335/proicons--github.svg'
};
const DATA_URL = 'https://raw.githubusercontent.com/itmo-ai/itmo-open-source-list/main/build/data.json';

async function initializeData() {
  try {
    const cacheKey = 'itmo_data';
    const cacheTimestampKey = 'cache_time';
    const cacheDuration = 3600000;

    const now = Date.now();
    const cachedData = localStorage.getItem(cacheKey);
    const cacheTimestamp = localStorage.getItem(cacheTimestampKey);

    if (cachedData && cacheTimestamp && now - parseInt(cacheTimestamp) < cacheDuration) {
      const data = JSON.parse(cachedData);
      laboratories = data.labs;
      projects = data.projects;
      renderLaboratories();
      return;
    }

    const response = await fetch(DATA_URL);
    const data = await response.json();

    laboratories = data.labs;
    projects = data.projects;

    localStorage.setItem(cacheKey, JSON.stringify(data));
    localStorage.setItem(cacheTimestampKey, now.toString());
    renderLaboratories();
  } catch (error) {
    console.error('Data loading error:', error);
    const cachedData = localStorage.getItem('itmo_data');
    if (cachedData) {
      const data = JSON.parse(cachedData);
      laboratories = data.labs;
      projects = data.projects;
      renderLaboratories();
    }
  }
}

async function getLogoDimensions(logoUrl) {
  if (logoCache[logoUrl]) return logoCache[logoUrl];

  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const ratio = img.naturalWidth / img.naturalHeight;
      logoCache[logoUrl] = { ratio, isWide: ratio > 2.0 };
      resolve(logoCache[logoUrl]);
    };
    img.onerror = () => resolve({ isWide: false });
    img.src = logoUrl;
  });
}

function createAvatar(logoUrl, identifier) {
  if (!logoUrl || logoUrl === 'null' || logoUrl === '' || logoUrl === null) {
    return `
      <div class="avatar-container">
        <div class="avatar-placeholder">${identifier.slice(0,2).toUpperCase()}</div>
      </div>
    `;
  }
  return `
    <div class="avatar-container">
      <img src="${logoUrl}" class="avatar-image" alt="${identifier}"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <div class="avatar-placeholder" style="display: none;">${identifier.slice(0,2).toUpperCase()}</div>
    </div>
  `;
}

function createStars(rating) {
  if (!rating || rating === 0) return '';
  return `<div style="display: flex; align-items: center; gap: 6px; margin-top: 12px; font-size: 16px; color: #f28c38; font-weight: 600;">
    ★ <span style="font-size: 14px; color: #666;">${rating.toLocaleString()}</span>
  </div>`;
}

function createProjectLinks(project) {
  let pos = 1;
  const icons = [];

  if (project.github_url) {
    icons.push(`
      <a href="${project.github_url}" target="_blank" class="social-icon github-icon" data-pos="${pos++}" title="GitHub">
        <img src="${ICONS.GITHUB_WHITE}" onerror="this.src='${ICONS.GITHUB_BLACK}'">
      </a>
    `);
  }
  if (project.links?.docs) {
    icons.push(`
      <a href="${project.links.docs}" target="_blank" class="social-icon docs-icon" data-pos="${pos++}" title="Документация">
        <img src="${ICONS.DOCS_WHITE}" onerror="this.src='${ICONS.DOCS_BLACK}'">
      </a>
    `);
  }
  if (project.links?.vkontakte) {
    icons.push(`
      <a href="${project.links.vkontakte}" target="_blank" class="social-icon" data-pos="${pos++}" title="VK">
        <img src="${ICONS.VK_WHITE}" onerror="this.src='${ICONS.VK_BLACK}'">
      </a>
    `);
  }
  if (project.links?.telegram) {
    icons.push(`
      <a href="${project.links.telegram}" target="_blank" class="social-icon" data-pos="${pos++}" title="Telegram">
        <img src="${ICONS.TELEGRAM_WHITE}" onerror="this.src='${ICONS.TELEGRAM_BLACK}'">
      </a>
    `);
  }
  if (project.links?.website) {
    icons.push(`
      <a href="${project.links.website}" target="_blank" class="social-icon" data-pos="${pos++}" title="Сайт">
        <img src="${ICONS.WEBSITE_WHITE}" onerror="this.src='${ICONS.WEBSITE_BLACK}'">
      </a>
    `);
  }
  if (icons.length === 0) return '';
  return `<div class="icons-row">${icons.join('')}</div>`;
}

function createLabIcons(lab) {
  let pos = 1;
  const icons = [];

  if (lab.links?.telegram) {
    icons.push(`
      <a href="${lab.links.telegram}" target="_blank" class="social-icon lab-icon" data-pos="${pos++}" title="Telegram">
        <img src="${ICONS.TELEGRAM_WHITE}" onerror="this.src='${ICONS.TELEGRAM_BLACK}'">
      </a>
    `);
  }
  if (lab.links?.website) {
    icons.push(`
      <a href="${lab.links.website}" target="_blank" class="social-icon lab-icon" data-pos="${pos++}" title="Сайт">
        <img src="${ICONS.WEBSITE_WHITE}" onerror="this.src='${ICONS.WEBSITE_BLACK}'">
      </a>
    `);
  }
  if (lab.links?.docs) {
    icons.push(`
      <a href="${lab.links.docs}" target="_blank" class="social-icon lab-icon" data-pos="${pos++}" title="Docs">
        <img src="${ICONS.DOCS_WHITE}" onerror="this.src='${ICONS.DOCS_BLACK}'">
      </a>
    `);
  }
  if (lab.links?.vkontakte) {
    icons.push(`
      <a href="${lab.links.vkontakte}" target="_blank" class="social-icon lab-icon" data-pos="${pos++}" title="VK">
        <img src="${ICONS.VK_WHITE}" onerror="this.src='${ICONS.VK_BLACK}'">
      </a>
    `);
  }
  if (icons.length === 0) return '';
  return `<div class="icons-row">${icons.join('')}</div>`;
}

function renderLaboratories() {
  const container = document.getElementById('projects-container');
  scrollPosition = window.scrollY;
  container.innerHTML = laboratories.map((lab, index) => {
    const exampleProjects = lab.example_projects || [];
    const iconsCount = [
      lab.links?.telegram,
      lab.links?.website,
      lab.links?.docs,
      lab.links?.vkontakte
    ].filter(Boolean).length;
    const hasIcons = iconsCount > 0;
    const hasExamples = exampleProjects.length > 0;
    return `
      <div class="lab-card lab-selector${hasIcons ? '' : ' no-icons'}${hasExamples ? '' : ' no-examples'}${iconsCount === 2 ? ' has-two-icons' : ''}${iconsCount === 3 ? ' has-three-icons' : ''}${iconsCount >= 4 ? ' has-four-icons' : ''}" data-lab-id="${lab.id}" style="cursor: pointer; position: relative;">
        ${lab.github_org ? `<a href="${lab.github_org}" target="_blank" class="github-button">Смотреть на GitHub</a>` : ''}
        ${createLabIcons(lab)}
        <div class="card-content">
          <div class="card-title">${index + 1} — ${lab.name}</div>
<div class="lab-description">
  ${lab.description?.ru || lab.description?.en || 'Научная лаборатория ИТМО'}
</div>
          ${exampleProjects.length > 0 ? `
            <div class="card-examples">
              Примеры проектов:\u00A0${exampleProjects.slice(0,5).join(',\u00A0')}
            </div>
          ` : ''}
        </div>
      </div>
    `;
  }).join('');
  setTimeout(() => {
    window.scrollTo(0, scrollPosition);
    fixContainerHeight();
  }, 100);
document.querySelectorAll('.lab-selector').forEach(card => {
  card.addEventListener('click', (event) => {
    if (event.target.closest('a, button')) return;
    scrollPosition = window.scrollY;
    const labId = card.dataset.labId;
    renderProjectsForLab(labId);
  });
});
}

async function renderProjectsForLab(labId) {
  const lab = laboratories.find(l => l.id === labId);
  const labProjects = projects.filter(p => p.lab === labId);

  await Promise.all(
    labProjects.map(project =>
      project.logo ? getLogoDimensions(project.logo) : Promise.resolve()
    )
  );

  const modalBody = document.getElementById('lab-modal-body');

  modalBody.innerHTML = `
    <div style="margin-bottom:40px; padding-left:92px; padding-right:92px;">
      <div class="card-title" style="font-size:28px;margin-bottom:16px;">
        ${lab.name}
      </div>
      <div class="lab-description" style="max-width:100%; padding-left:0; padding-right:0;">
        ${lab.description?.ru || lab.description?.en || ''}
      </div>
    </div>

    ${labProjects.length > 0 ? labProjects.map(project => {

      const isWide = logoCache[project.logo]?.isWide || false;
      const className = isWide ? 'avatar-wide' : '';

      return `
        <div class="lab-card project-item" style="max-width:100%;">

          <div class="avatar-container">
            ${project.logo ? `
              <img src="${project.logo}" class="avatar-image"
                   onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            ` : ''}
            <div class="avatar-placeholder"
                 style="display:${project.logo ? 'none':'flex'};">
              ${project.id.slice(0,2).toUpperCase()}
            </div>
          </div>

          <div class="card-content">
            <div class="card-title">
              <a href="${project.github_url}" target="_blank"
                 style="color:#1a1a1a;text-decoration:none;">
                ${project.title}
              </a>
            </div>

            ${project.description ? `
              <div class="lab-description" style="font-size:14px;">
                ${typeof project.description === 'string'
                  ? project.description.slice(0,140)
                  : (project.description.ru?.slice(0,140) ||
                     project.description.en?.slice(0,140) || '')
                }
              </div>
            ` : ''}

            <div class="card-examples"
                 style="font-size:14px;margin-bottom:2px;">
              <span style="margin-right:12px;">
                ${project.area || ''}
              </span>
              <span>${project.language || ''}</span>
            </div>

            ${createStars(project.stars)}
            ${createProjectLinks(project)}

          </div>

        </div>
      `;
    }).join('') : `
      <div style="text-align:center;color:#999;">
        Проекты пока не добавлены
      </div>
    `}
  `;
  if (!document.getElementById('lab-modal-moved')) {
    var modal = document.getElementById('lab-modal');
    document.body.appendChild(modal);
    modal.id = 'lab-modal';
    modal.setAttribute('data-moved', '1');
    var marker = document.createElement('span');
    marker.id = 'lab-modal-moved';
    marker.style.display = 'none';
    document.body.appendChild(marker);
  }
  openModal();
  history.pushState({lab: labId}, '', `#${labId}`);
}

function openModal() {
  const modal = document.getElementById('lab-modal');
  modal.classList.add('active');
  modal.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  const modal = document.getElementById('lab-modal');
  modal.classList.remove('active');
  modal.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
  history.pushState('', document.title, window.location.pathname);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

window.addEventListener('load', () => {
  const hash = window.location.hash.replace('#','');
  if (hash) renderProjectsForLab(hash);
  setTimeout(fixContainerHeight, 500);
  setTimeout(fixContainerHeight, 2000);
});

initializeData();
</script>
